<div class="container">
  <app-expense-header [totalExpenses]="totalExpenses"></app-expense-header>

  <app-filters-list
    [categories]="categories"
    [selectedCategory]="filterCategory"
    (filterChange)="setFilterCategory($event)"
  ></app-filters-list>

  <app-expense-form
    [categories]="categories"
    (add)="addExpense($event)"
  ></app-expense-form>

  <app-expense-list
    [expenses]="filteredExpenses"
    (deleteExpense)="deleteExpense($event)"
  ></app-expense-list>
</div>
